<svg viewBox="0 0 120 140" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bio Bouncer logo">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#2c8ec7"/>
      <stop offset="100%" stop-color="#0a2942"/>
    </linearGradient>
    <linearGradient id="ropeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#f6c24e"/>
      <stop offset="100%" stop-color="#c98715"/>
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="3" result="o"/>
      <feFlood flood-color="#000" flood-opacity="0.28"/>
      <feComposite in2="o" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Velvet-rope stanchions: small "VIP" nod to the bouncer theme -->
  <g filter="url(#dropShadow)">
    <rect x="6"   y="92" width="6"  height="36" rx="2" fill="#1a2937"/>
    <rect x="108" y="92" width="6"  height="36" rx="2" fill="#1a2937"/>
    <circle cx="9"   cy="90" r="4"  fill="url(#ropeGrad)"/>
    <circle cx="111" cy="90" r="4"  fill="url(#ropeGrad)"/>
    <!-- Rope (catenary) connecting the two posts -->
    <path d="M 9 91 Q 60 116 111 91"
          stroke="url(#ropeGrad)" stroke-width="3.4" fill="none"
          stroke-linecap="round"/>
  </g>

  <!-- Shield body -->
  <path d="M60 6 L102 22 L102 60 Q102 100 60 122 Q18 100 18 60 L18 22 Z"
        fill="url(#shieldGrad)"
        stroke="#ffffff" stroke-width="2.4"
        filter="url(#dropShadow)"/>

  <!-- DNA double helix inside the shield -->
  <g stroke="#ffffff" fill="none" stroke-linecap="round">
    <!-- Strand 1 (sinusoidal) -->
    <path d="M 38 30 Q 82 44 38 58 Q 82 72 38 86 Q 82 100 38 110"
          stroke-width="2.6"/>
    <!-- Strand 2 (phase-shifted) -->
    <path d="M 82 30 Q 38 44 82 58 Q 38 72 82 86 Q 38 100 82 110"
          stroke-width="2.6"/>
    <!-- Rungs (base pairs) -->
    <line x1="40"  y1="30" x2="80" y2="30" stroke-width="1.9"/>
    <line x1="50"  y1="44" x2="70" y2="44" stroke-width="1.9"/>
    <line x1="40"  y1="58" x2="80" y2="58" stroke-width="1.9"/>
    <line x1="50"  y1="72" x2="70" y2="72" stroke-width="1.9"/>
    <line x1="40"  y1="86" x2="80" y2="86" stroke-width="1.9"/>
    <line x1="50" y1="100" x2="70" y2="100" stroke-width="1.9"/>
  </g>

  <!-- Small "checkpoint" badge top-right of shield -->
  <g>
    <circle cx="92" cy="32" r="11" fill="#22c55e" stroke="#ffffff" stroke-width="2"/>
    <path d="M86 32 l4 4 l8 -8" stroke="#ffffff" stroke-width="2.6" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
